services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: soc
      POSTGRES_PASSWORD: soc_password
      POSTGRES_DB: soc_db
    ports:
      - "5432:5432"
    volumes:
      - soc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc -d soc_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://soc:soc_password@db:5432/soc_db
      SECRET_KEY: dev-secret-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html

volumes:
  soc_pgdata:
